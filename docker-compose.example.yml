services:
  moonbridge:
    build:
      context: .
      dockerfile: Dockerfile
    image: moonbridge:local
    container_name: moonbridge
    restart: unless-stopped
    command:
      - -config
      - /config/config.yml
      - -addr
      - 0.0.0.0:38440
    ports:
      - "127.0.0.1:38440:38440"
    volumes:
      # Mount the containing directory, not the file itself. Many editors save
      # by renaming a temp file over config.yml; file-level bind mounts can then
      # leave /config/config.yml missing inside the container.
      - ./config:/config:ro
      - ./data:/app/data
      - ./logs:/app/logs
      - ./trace:/app/trace
    healthcheck:
      test:
        - CMD
        - /app/moonbridge
        - -config
        - /config/config.yml
        - -addr
        - 0.0.0.0:38440
        - -print-addr
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
