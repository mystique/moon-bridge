# yaml-language-server: $schema=./config.schema.json
# =============================================================================
# MoonBridge Configuration Example
# =============================================================================
# This file documents every configurable field and serves as a live reference.
# Uncomment and adjust values for your own deployment.

# --- Operating Mode ----------------------------------------------------------
mode: "Transform"   # Transform | CaptureAnthropic | CaptureResponse

# --- Tracing -----------------------------------------------------------------
trace:
  enabled: false    # Dump full request/response traces to data/trace/

# --- Logging -----------------------------------------------------------------
log:
  level: "info"     # debug | info | warn | error | off
  format: "text"    # text | json

# --- Server ------------------------------------------------------------------
server:
  addr: "127.0.0.1:38440"
  # auth_token: "replace-with-your-secret-token"   # Bearer auth (omit for none)
  # max_sessions: 100                               # 0 = unlimited
  # session_ttl: "24h"                              # idle session timeout

# --- Defaults ----------------------------------------------------------------
defaults:
  model: "moonbridge"
  max_tokens: 65536
  # How Codex namespace tools (e.g. MCP servers, exposed as mcp__<server>) are
  # translated into upstream tools.
  #   flat          (default) each sub-tool becomes an independent function tool
  #                  with a simple object schema — most compatible across upstreams
  #   nested_oneof  one tool per namespace, input_schema uses top-level oneOf
  #   nested_anyof  one tool per namespace, action enum + params anyOf
  # Flat is recommended: some upstreams/models fail to call oneOf/anyOf tools
  # reliably (empty input) and the flat path keeps multi-turn history consistent.
  namespace_strategy: "flat"
  # system_prompt: ""                               # prepended to every request

# --- Top-Level Web Search ----------------------------------------------------
# These values apply when no provider/model/route-level override is set.
# web_search:
#   support: "auto"              # auto | enabled | disabled | injected
#   tavily_api_key: "tvly-..."
#   firecrawl_api_key: "fc-..."
#   search_max_rounds: 5

# --- Outbound Proxy ----------------------------------------------------------
# HTTP(S) proxy for all upstream API calls. Two comma-separated values:
# first = HTTP(S), second = SOCKS5 fallback.
egress_proxy: "http://127.0.0.1:7890"

# --- Cache -------------------------------------------------------------------
cache:
  mode: "explicit"               # off | automatic | explicit | hybrid
  ttl: "5m"                      # 5m | 1h
  prompt_caching: true
  automatic_prompt_cache: false
  explicit_cache_breakpoints: true
  allow_retention_downgrade: false
  max_breakpoints: 4
  min_cache_tokens: 1024
  expected_reuse: 2
  minimum_value_score: 2048
  min_breakpoint_tokens: 1024

# --- Persistence (management API storage) ------------------------------------
persistence:
  active_provider: db_sqlite     # db_sqlite | db_d1

# --- Proxy (Capture modes only) ----------------------------------------------
# Required when mode is CaptureResponse or CaptureAnthropic.
proxy:
  response:
    base_url: "https://api.openai.com"
    api_key: "replace-with-real-openai-key"
    model: "gpt-5.5"             # default model for /v1/responses pass-through
  anthropic:
    base_url: "https://api.anthropic.com"
    api_key: "replace-with-real-anthropic-key"
    version: "2023-06-01"

# --- Extensions --------------------------------------------------------------
extensions:
  # DeepSeek V4: re-inforce system instructions on each user turn
  deepseek_v4:
    config:
      reinforce_instructions: true
      reinforce_prompt: "[System Reminder]: Please pay close attention to the system
        instructions, AGENTS.md files, and any other context provided. Follow them
        carefully and completely in your response.\n[User]:"

  # Visual: auto-route image tasks to a vision model (e.g. Kimi)
  visual:
    config:
      provider: "kimi"
      model: "kimi-for-coding"
      max_rounds: 4
      max_tokens: 2048

  # Kimi tool-call round limiter
  kimi_workaround:
    config:
      max_tool_rounds: 50
      convergence_margin: 0.8
    # Enable per-model via extensions block:
    # models:
    #   kimi-for-coding:
    #     extensions:
    #       kimi_workaround:
    #         enabled: true

  # apply_patch proxy: split apply_patch into structured sub-tools
  # codex_tool_proxy:
  #   enabled: true

  # Database: SQLite (local persistence)
  db_sqlite:
    enabled: true
    config:
      path: ./data/moonbridge.db
      wal: true
      busy_timeout_ms: 5000
      max_open_conns: 1

  # Database: Cloudflare D1 (edge deployment only)
  # db_d1:
  #   enabled: true
  #   config:
  #     binding: MOONBRIDGE_DB

  # Metrics: request analytics (optional)
  metrics:
    enabled: true
    config:
      default_limit: 100
      max_limit: 1000

# =============================================================================
# Models
# =============================================================================
# Model metadata (context_window, display_name, reasoning_levels, modalities,
# pricing, etc.) is stored in metadata/models/<slug>.json. The models section
# below only contains runtime behaviour overrides: extension toggles and
# web_search configuration at the model level.
models:
  deepseek-v4-pro:
    web_search:
      support: "auto"
    extensions:
      deepseek_v4:
        enabled: true
      visual:
        enabled: true

  deepseek-v4-flash:
    web_search:
      support: "auto"
    extensions:
      deepseek_v4:
        enabled: true
      visual:
        enabled: true

  claude-sonnet-4-20250514:
    extensions: {}   # no overrides, metadata only

  # kimi-for-coding:
  #   context_window: 128000
  #   extensions:
  #     kimi_workaround:
  #       enabled: true

  # codex-auto-review: Codex auto-review escalation requests model
  # Used by Codex CLI for automatic review of privilege-elevation
  # (sandbox escalation) requests. Typically maps to a frontier model.
  codex-auto-review:
    extensions: {}

# =============================================================================
# Providers
# =============================================================================
providers:
  deepseek:
    protocol: "anthropic"            # anthropic (default) | openai-response | google-genai | openai-chat
    base_url: "https://api.deepseek.com/anthropic"
    api_key: "replace-with-deepseek-api-key"
    version: "2023-06-01"
    user_agent: "moonbridge/1.0"
    web_search:
      support: "auto"
    offers:
      - model: deepseek-v4-pro
        pricing:
          input_price: 2
          output_price: 8
          cache_write_price: 1
          cache_read_price: 0.2
      - model: deepseek-v4-flash
        pricing:
          input_price: 1
          output_price: 2
          cache_write_price: 1
          cache_read_price: 0.02

  kimi:
    protocol: "anthropic"
    base_url: "https://api.kimi.com/coding/"
    api_key: "replace-with-kimi-api-key"
    version: "2023-06-01"
    user_agent: "moonbridge/1.0"
    offers:
      - model: kimi-for-coding

  openai:
    protocol: "openai-response"
    base_url: "https://api.openai.com"
    api_key: "replace-with-openai-api-key"
    user_agent: "moonbridge/1.0"
    offers:
      - model: codex-auto-review

  anthropic:
    protocol: "anthropic"
    base_url: "https://api.anthropic.com"
    api_key: "replace-with-anthropic-api-key"
    version: "2023-06-01"
    user_agent: "moonbridge/1.0"
    web_search:
      support: "enabled"
    offers:
      - model: claude-sonnet-4-20250514
        pricing:
          input_price: 3
          output_price: 15
          cache_write_price: 3.75
          cache_read_price: 0.30

  # Google Gemini (Vertex AI via GenAI SDK)
  # gemini:
  #   protocol: "google-genai"
  #   base_url: "https://generativelanguage.googleapis.com"
  #   api_key: "replace-with-gemini-api-key"
  #   project: "my-gcp-project"
  #   location: "us-central1"
  #   api_version: "v1"
  #   offers:
  #     - model: gemini-2.5-flash

# =============================================================================
# Routes
# =============================================================================
# Optional aliases. Provider models are listed directly in the Codex catalog
# as model(provider) format (e.g. deepseek-v4-pro(deepseek)). Routes only
# add friendly fallback names like "moonbridge".
# Backward-compatible shorthand: <route>: "provider/upstream-model"
routes:
  moonbridge:
    model: deepseek-v4-pro
    provider: deepseek
  codex-auto-review:
    model: codex-auto-review
    provider: openai
